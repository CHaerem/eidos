<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>Golfsimulator 3D Romplanlegger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden;background:#1a1a1a}
#sidebar{width:300px;background:#fff;border-right:1px solid #ddd;overflow-y:auto;flex-shrink:0}
#sidebar h2{font-size:15px;margin-bottom:8px;color:#333}
#canvas-wrap{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}
label{display:block;font-size:12px;color:#555;margin-bottom:2px}
label b{color:#333}
input[type=range]{width:100%;margin:2px 0 8px}
select{width:100%;padding:4px;margin-bottom:8px;font-size:13px}
button.view-btn{width:100%;padding:7px;font-size:12px;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;margin-bottom:5px}
button.view-btn:hover{background:#e8e8e8}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px}
.info-grid .lbl{color:#888}
.info-grid .val{color:#333;font-weight:600}
.val.ok{color:#2a7}
.val.tight{color:#c80}
.val.bad{color:#c22}
#status{font-size:11px;color:#888;margin-top:8px;padding:0 16px 12px}
.radio-group{display:flex;gap:8px;margin-bottom:8px}
.radio-group label{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px}

/* Collapsible sections */
.section{border-bottom:1px solid #eee}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;background:#fafafa;border-bottom:1px solid #eee;user-select:none}
.section-header:hover{background:#f0f0f0}
.section-header h3{font-size:13px;font-weight:600;color:#333;margin:0}
.section-header .arrow{font-size:10px;color:#888;transition:transform 0.2s}
.section-body{padding:12px 16px}
.section.collapsed .section-body{display:none}
.section.collapsed .arrow{transform:rotate(-90deg)}

/* Furniture list */
.furn-item{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:5px;padding:8px 10px;margin-bottom:6px;font-size:12px}
.furn-item.selected{border-color:#4488cc;background:#eef4ff}
.furn-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.furn-item-header span{font-weight:600;cursor:pointer;color:#333}
.furn-item-header span:hover{color:#4488cc}
.btn-del{background:none;border:none;color:#c44;cursor:pointer;font-size:16px;line-height:1;padding:0 4px}
.btn-del:hover{color:#f00}
.furn-controls{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
.furn-controls label{font-size:11px;margin-bottom:0}
.furn-controls input[type=range]{margin:0 0 4px}

button.add-btn{width:100%;padding:7px;font-size:12px;cursor:pointer;border:1px solid #4a8;border-radius:4px;background:#e8f5ee;color:#2a6;font-weight:600;margin-top:4px}
button.add-btn:hover{background:#d4eddb}
</style>
</head>
<body>

<div id="sidebar">

  <!-- Visning -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <h3>Visning</h3><span class="arrow">▾</span>
    </div>
    <div class="section-body">
      <button class="view-btn" onclick="setTopDown()">Ovenfra</button>
      <button class="view-btn" onclick="set3DView()">3D-visning</button>
      <button class="view-btn" onclick="setFrontView()">Front (fra vindu)</button>
      <button class="view-btn" onclick="setSideView()">Sidevisning</button>
    </div>
  </div>

  <!-- Golfsimulator -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <h3>Golfsimulator</h3><span class="arrow">▾</span>
    </div>
    <div class="section-body">
      <label><input type="checkbox" id="simToggle" checked> Vis simulator</label>
      <div id="simControls">
        <label><b>Spillerhøyde:</b> <span id="hVal">180</span> cm</label>
        <input type="range" id="hSlider" min="160" max="205" value="180" step="1">

        <label><b>Klubb:</b></label>
        <select id="clubSelect">
          <option value="1.143">Driver (45")</option>
          <option value="1.016">3-wood (40")</option>
          <option value="0.978">Hybrid (38.5")</option>
          <option value="0.940" selected>7-jern (37")</option>
          <option value="0.914">9-jern (36")</option>
          <option value="0.889">Wedge (35")</option>
        </select>

        <label><b>Retning:</b></label>
        <div class="radio-group">
          <label><input type="radio" name="dir" value="window" checked> Mot vindu</label>
          <label><input type="radio" name="dir" value="along"> Langs rommet</label>
        </div>

        <label><b>Sim posisjon X:</b> <span id="simXVal">2.5</span>m</label>
        <input type="range" id="simXSlider" min="-4" max="4" value="2.5" step="0.05">

        <label><b>Sim posisjon Z:</b> <span id="simZVal">0.5</span>m</label>
        <input type="range" id="simZSlider" min="-2.5" max="2.5" value="0.5" step="0.05">

        <h2 style="margin-top:8px">Klaringer</h2>
        <div class="info-grid">
          <span class="lbl">Tak-klaring:</span><span class="val" id="cCeil">–</span>
          <span class="lbl">Hemskant-avst:</span><span class="val" id="cHems">–</span>
          <span class="lbl">Sideklaring V:</span><span class="val" id="cSideL">–</span>
          <span class="lbl">Sideklaring H:</span><span class="val" id="cSideR">–</span>
          <span class="lbl">Skjerm-avstand:</span><span class="val" id="cScreen">–</span>
          <span class="lbl">Svingradius:</span><span class="val" id="cSwing">–</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Møbler -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">
      <h3>Møbler</h3><span class="arrow">▾</span>
    </div>
    <div class="section-body">
      <select id="furnSelect">
        <option value="besta_3x">BESTÅ skap (3×60cm)</option>
        <option value="soderhamn">Söderhamn hjørnesofa 3-s</option>
        <option value="cana_tv">Bolia Cana + Frame 50" TV</option>
        <option value="sofa_3">Sofa (3-seter)</option>
        <option value="sofa_2">Sofa (2-seter)</option>
        <option value="stol">Lenestol</option>
        <option value="sofabord">Sofabord</option>
        <option value="spisebord">Spisebord</option>
        <option value="tv_benk">TV-benk</option>
        <option value="bokhylle">Bokhylle</option>
        <option value="gulvlampe">Gulvlampe</option>
        <option value="kjokkenbenk">Kjøkkenbenk</option>
        <option value="spisestol">Spisestol</option>
      </select>
      <button class="add-btn" onclick="addFurniture()">+ Legg til møbel</button>
      <div id="furnList" style="margin-top:10px"></div>
    </div>
  </div>

  <div id="status">Laster...</div>
</div>

<div id="canvas-wrap"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

// ─── CEILING & SWING CONSTANTS ───
const CEIL = {
  windowZ: -2.50,
  backZ: 2.50,
  hemskantDist: 3.10,
  ceilWindow: 2.214,
  ceilHemskant: 3.822,
  ceilUnderHems: 2.25,
  hemsDepth: 1.90,
  roomMinX: -4.38,
  roomMaxX: 4.38,
};
CEIL.hemskantZ = CEIL.windowZ + CEIL.hemskantDist;

function ceilAt(z) {
  const d = z - CEIL.windowZ;
  if (d <= 0) return CEIL.ceilWindow;
  if (d <= CEIL.hemskantDist) {
    return CEIL.ceilWindow + d * (CEIL.ceilHemskant - CEIL.ceilWindow) / CEIL.hemskantDist;
  }
  return CEIL.ceilUnderHems;
}

// ─── SWING FORMULAS ───
function swingHeight(heightCm, clubLen) {
  return (heightCm / 100) * 0.80 + clubLen * Math.sin(75 * Math.PI / 180);
}
function backswingOffset(clubLen) {
  return clubLen * 0.4;
}
function swingRadius(heightCm, clubLen) {
  const armLen = (heightCm / 100) * 0.36;
  return armLen + clubLen;
}

// ─── FURNITURE CATALOG ───
const FURNITURE_CATALOG = {
  besta_3x:    { name: 'BESTÅ skap (3×)', w: 1.80, h: 1.928, d: 0.40, color: 0x3B3B3B, custom: 'besta' },
  soderhamn:   { name: 'Söderhamn hjørne 3-s', w: 1.92, h: 0.83, d: 1.92, color: 0x8B8B8B, custom: 'soderhamn' },
  cana_tv:     { name: 'Bolia Cana + Frame TV', w: 1.28, h: 1.11, d: 0.40, color: 0xC4A87C, custom: 'cana_tv' },
  sofa_3:      { name: 'Sofa (3-seter)', w: 2.1, h: 0.85, d: 0.9, color: 0x6B4C3B },
  sofa_2:      { name: 'Sofa (2-seter)', w: 1.5, h: 0.85, d: 0.9, color: 0x6B4C3B },
  stol:        { name: 'Lenestol', w: 0.85, h: 0.85, d: 0.85, color: 0x7B5C4B },
  sofabord:    { name: 'Sofabord', w: 1.2, h: 0.45, d: 0.6, color: 0x8B7355 },
  spisebord:   { name: 'Spisebord', w: 1.6, h: 0.75, d: 0.9, color: 0x8B7355 },
  tv_benk:     { name: 'TV-benk', w: 1.8, h: 0.5, d: 0.4, color: 0x444444 },
  bokhylle:    { name: 'Bokhylle', w: 1.0, h: 1.8, d: 0.35, color: 0x9B8365 },
  gulvlampe:   { name: 'Gulvlampe', w: 0.3, h: 1.6, d: 0.3, color: 0xCCCCCC },
  kjokkenbenk: { name: 'Kjøkkenbenk', w: 2.5, h: 0.9, d: 0.6, color: 0xEEEEEE },
  spisestol:   { name: 'Spisestol', w: 0.45, h: 0.9, d: 0.45, color: 0x8B7355 },
};

const placedItems = [];
let selectedItemId = null;
let nextItemId = 1;

// ─── THREE.JS SETUP ───
const wrap = document.getElementById('canvas-wrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a2a);

const camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
camera.position.set(8, 6, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
wrap.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(8, 12, 5);
scene.add(dirLight);

const grid = new THREE.GridHelper(15, 30, 0x444444, 0x333333);
scene.add(grid);

let objCenter = new THREE.Vector3(0, 1.22, 0);
let objSize = new THREE.Vector3(8.92, 2.44, 5.16);

// ─── CEILING GEOMETRY ───
const ceilGroup = new THREE.Group();

const slopeGeo = new THREE.BufferGeometry();
const xL = CEIL.roomMinX, xR = CEIL.roomMaxX;
const zW = CEIL.windowZ, zH = CEIL.hemskantZ;
const yW = CEIL.ceilWindow, yH = CEIL.ceilHemskant;
slopeGeo.setAttribute('position', new THREE.Float32BufferAttribute([
  xL, yW, zW,  xR, yW, zW,  xR, yH, zH,
  xL, yW, zW,  xR, yH, zH,  xL, yH, zH,
], 3));
slopeGeo.computeVertexNormals();
ceilGroup.add(new THREE.Mesh(slopeGeo, new THREE.MeshLambertMaterial({
  color: 0x6688AA, transparent: true, opacity: 0.25, side: THREE.DoubleSide
})));
ceilGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(slopeGeo),
  new THREE.LineBasicMaterial({ color: 0x5577AA, opacity: 0.5, transparent: true })));

const flatGeo = new THREE.BufferGeometry();
const zB = CEIL.backZ;
flatGeo.setAttribute('position', new THREE.Float32BufferAttribute([
  xL, CEIL.ceilUnderHems, zH,  xR, CEIL.ceilUnderHems, zH,  xR, CEIL.ceilUnderHems, zB,
  xL, CEIL.ceilUnderHems, zH,  xR, CEIL.ceilUnderHems, zB,  xL, CEIL.ceilUnderHems, zB,
], 3));
flatGeo.computeVertexNormals();
ceilGroup.add(new THREE.Mesh(flatGeo, new THREE.MeshLambertMaterial({
  color: 0xAA8866, transparent: true, opacity: 0.25, side: THREE.DoubleSide
})));

const kantGeo = new THREE.BufferGeometry();
kantGeo.setAttribute('position', new THREE.Float32BufferAttribute([
  xL, yH, zH,  xR, yH, zH,  xR, CEIL.ceilUnderHems, zH,
  xL, yH, zH,  xR, CEIL.ceilUnderHems, zH,  xL, CEIL.ceilUnderHems, zH,
], 3));
kantGeo.computeVertexNormals();
ceilGroup.add(new THREE.Mesh(kantGeo, new THREE.MeshLambertMaterial({
  color: 0xCC4444, transparent: true, opacity: 0.4, side: THREE.DoubleSide
})));
ceilGroup.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(xL, yH, zH), new THREE.Vector3(xR, yH, zH),
  ]),
  new THREE.LineBasicMaterial({ color: 0xFF4444, linewidth: 2 })
));
scene.add(ceilGroup);

// ─── SIMULATOR GROUP ───
const simGroup = new THREE.Group();

const screenW = 2.5, screenH = 2.0;
const screenGeo = new THREE.PlaneGeometry(screenW, screenH);
const screenMesh = new THREE.Mesh(screenGeo, new THREE.MeshLambertMaterial({ color: 0x333333, side: THREE.DoubleSide }));
screenMesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(screenGeo), new THREE.LineBasicMaterial({ color: 0x666666 })));
simGroup.add(screenMesh);

const matW = 1.5, matD = 1.2;
const matMesh = new THREE.Mesh(
  new THREE.BoxGeometry(matW, 0.02, matD),
  new THREE.MeshLambertMaterial({ color: 0x2D7A2D })
);
matMesh.position.y = 0.01;
simGroup.add(matMesh);

const golferGroup = new THREE.Group();
const bodyMat = new THREE.MeshLambertMaterial({ color: 0x4466AA });
const bodyMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.9, 8), bodyMat);
bodyMesh.position.y = 0.9;
golferGroup.add(bodyMesh);
const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), bodyMat);
headMesh.position.y = 1.5;
golferGroup.add(headMesh);
simGroup.add(golferGroup);

let arcMesh = null;
let bsMesh = null;
const arcMatGreen = new THREE.MeshBasicMaterial({ color: 0x00FF66, depthTest: false });
const arcMatRed = new THREE.MeshBasicMaterial({ color: 0xFF3333, depthTest: false });
const bsMatOrange = new THREE.MeshBasicMaterial({ color: 0xFFAA00, depthTest: false });
const bsMatRed = new THREE.MeshBasicMaterial({ color: 0xFF3333, depthTest: false });

const ballMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.03, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xFFFFFF })
);
simGroup.add(ballMesh);

scene.add(simGroup);

// ─── LOAD OBJ ───
const loader = new OBJLoader();
loader.load(
  'Vibes%20Gate%2020%20-%20Ground%20Floor.obj',
  (obj) => {
    obj.scale.set(0.1, 0.1, 0.1);
    obj.position.y = 1.22;

    obj.traverse((child) => {
      if (child.isMesh) {
        const name = child.name || '';
        if (name.startsWith('WholeFloor')) {
          child.material = new THREE.MeshLambertMaterial({ color: 0xD4C8B8, side: THREE.DoubleSide });
        } else if (name.startsWith('ExternalWalls')) {
          child.material = new THREE.MeshLambertMaterial({ color: 0x8899AA, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
        } else if (name.startsWith('FloorFillerTop')) {
          child.visible = false;
        } else if (name.startsWith('InnerSide')) {
          child.material = new THREE.MeshLambertMaterial({ color: 0xC4B8A8, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
        } else {
          child.material = new THREE.MeshLambertMaterial({ color: 0xAAAAAA, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
        }
      }
    });

    scene.add(obj);

    const box = new THREE.Box3().setFromObject(obj);
    objCenter = box.getCenter(new THREE.Vector3());
    objSize = box.getSize(new THREE.Vector3());

    controls.target.copy(objCenter);
    camera.position.set(objCenter.x + 6, objCenter.y + 5, objCenter.z + 8);
    controls.update();

    document.getElementById('status').textContent = 'OBJ lastet. Juster kontrollene i sidepanelet.';
    updateSimulator();
  },
  null,
  (err) => { document.getElementById('status').textContent = 'Feil: ' + err.message; }
);

// ─── SIMULATOR TOGGLE ───
document.getElementById('simToggle').addEventListener('change', (e) => {
  simGroup.visible = e.target.checked;
  document.getElementById('simControls').style.display = e.target.checked ? '' : 'none';
});

// ─── UPDATE SIMULATOR ───
function updateSimulator() {
  const heightCm = parseInt(document.getElementById('hSlider').value);
  const clubLen = parseFloat(document.getElementById('clubSelect').value);
  const dir = document.querySelector('input[name="dir"]:checked').value;
  const simX = parseFloat(document.getElementById('simXSlider').value);
  const simZ = parseFloat(document.getElementById('simZSlider').value);

  document.getElementById('hVal').textContent = heightCm;
  document.getElementById('simXVal').textContent = simX.toFixed(1);
  document.getElementById('simZVal').textContent = simZ.toFixed(1);

  const heightM = heightCm / 100;
  const sR = swingRadius(heightCm, clubLen);
  const sH = swingHeight(heightCm, clubLen);

  let golferX = simX, golferZ = simZ;
  let screenX, screenZ, screenRotY = 0;

  if (dir === 'window') {
    screenX = golferX;
    screenZ = CEIL.windowZ + 0.3;
    screenRotY = 0;
  } else {
    screenX = CEIL.roomMaxX - 0.3;
    screenZ = golferZ;
    screenRotY = Math.PI / 2;
  }

  golferGroup.position.set(golferX, 0, golferZ);
  golferGroup.scale.y = heightM / 1.80;
  matMesh.position.set(golferX, 0.01, golferZ);
  screenMesh.position.set(screenX, screenH / 2 + 0.1, screenZ);
  screenMesh.rotation.y = screenRotY;

  // Clearances
  const ceilH = ceilAt(golferZ);
  const ceilClearance = ceilH - sH;
  const hemsDist = CEIL.hemskantZ - golferZ;
  const sideL = golferX - CEIL.roomMinX;
  const sideR = CEIL.roomMaxX - golferX;
  const screenDist = dir === 'window'
    ? Math.abs(golferZ - screenZ) - 0.5
    : Math.abs(golferX - screenX) - 0.5;

  // Swing arc
  const swingPlaneAngle = 70 * Math.PI / 180;
  const pivotY = heightM * 0.55;

  function clubPos(theta) {
    const y = pivotY - sR * Math.cos(theta) * Math.sin(swingPlaneAngle);
    const alongTarget = sR * Math.sin(theta) * Math.cos(swingPlaneAngle);
    const lateral = sR * Math.sin(theta) * 0.15;
    if (dir === 'window') {
      return new THREE.Vector3(golferX + lateral, Math.max(0, y), golferZ + alongTarget);
    } else {
      return new THREE.Vector3(golferX - alongTarget, Math.max(0, y), golferZ + lateral);
    }
  }

  ballMesh.position.copy(clubPos(0));

  const dsPoints = [];
  for (let i = 0; i <= 40; i++) {
    const t = i / 40;
    const theta = (1 - t) * (150 * Math.PI / 180) + t * (-70 * Math.PI / 180);
    dsPoints.push(clubPos(theta));
  }

  if (arcMesh) { simGroup.remove(arcMesh); arcMesh.geometry.dispose(); }
  if (dsPoints.length > 1) {
    const curve = new THREE.CatmullRomCurve3(dsPoints);
    const tubeGeo = new THREE.TubeGeometry(curve, 40, 0.04, 8, false);
    const ok = ceilClearance > 0.15 && Math.min(sideL, sideR) > sR * 0.3;
    arcMesh = new THREE.Mesh(tubeGeo, ok ? arcMatGreen : arcMatRed);
    simGroup.add(arcMesh);
  }

  const bsArcPoints = [];
  for (let i = 0; i <= 20; i++) {
    const t = i / 20;
    const theta = t * (150 * Math.PI / 180);
    bsArcPoints.push(clubPos(theta));
  }

  if (bsMesh) { simGroup.remove(bsMesh); bsMesh.geometry.dispose(); }
  if (bsArcPoints.length > 1) {
    const bsCurve = new THREE.CatmullRomCurve3(bsArcPoints);
    const bsTubeGeo = new THREE.TubeGeometry(bsCurve, 20, 0.035, 8, false);
    bsMesh = new THREE.Mesh(bsTubeGeo, ceilClearance > 0.05 ? bsMatOrange : bsMatRed);
    simGroup.add(bsMesh);
  }

  setVal('cCeil', ceilClearance, 'm');
  setVal('cHems', hemsDist, 'm');
  setVal('cSideL', sideL, 'm');
  setVal('cSideR', sideR, 'm');
  document.getElementById('cScreen').textContent = screenDist.toFixed(2) + 'm';
  document.getElementById('cSwing').textContent = sR.toFixed(2) + 'm';
}

function setVal(id, val, unit) {
  const el = document.getElementById(id);
  el.textContent = val.toFixed(2) + unit;
  el.className = 'val ' + (val > 0.3 ? 'ok' : val > 0.05 ? 'tight' : 'bad');
}

// ─── FURNITURE SYSTEM ───

function addEdges(mesh, group) {
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(mesh.geometry),
    new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
  );
  edges.position.copy(mesh.position);
  edges.rotation.copy(mesh.rotation);
  group.add(edges);
}

function addLabel(name, h, group) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 512, 64);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(name, 256, 40);
  const tex = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(1.6, 0.2, 1);
  sprite.position.y = h + 0.25;
  group.add(sprite);
}

// ─── BESTÅ skap (3×60cm = 180cm breed, 40cm dyp, 192cm høy) ───
function createBesta(group) {
  const W = 1.80, H = 1.92, D = 0.40;
  const frameW = 0.60, wallT = 0.018;
  const cabinetMat = new THREE.MeshLambertMaterial({ color: 0x2B2B2B });
  const doorMat = new THREE.MeshLambertMaterial({ color: 0x3C3C3C });
  const handleMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const shelfMat = new THREE.MeshLambertMaterial({ color: 0x2B2B2B });

  for (let i = 0; i < 3; i++) {
    const offsetX = -W/2 + frameW/2 + i * frameW;
    const cabinetGroup = new THREE.Group();

    // Back panel
    const back = new THREE.Mesh(new THREE.BoxGeometry(frameW, H, wallT), cabinetMat);
    back.position.set(0, H/2, -D/2 + wallT/2);
    cabinetGroup.add(back);

    // Top
    const top = new THREE.Mesh(new THREE.BoxGeometry(frameW, wallT, D), cabinetMat);
    top.position.set(0, H - wallT/2, 0);
    cabinetGroup.add(top);

    // Bottom
    const bottom = new THREE.Mesh(new THREE.BoxGeometry(frameW, wallT, D), cabinetMat);
    bottom.position.set(0, wallT/2, 0);
    cabinetGroup.add(bottom);

    // Left side
    const left = new THREE.Mesh(new THREE.BoxGeometry(wallT, H, D), cabinetMat);
    left.position.set(-frameW/2 + wallT/2, H/2, 0);
    cabinetGroup.add(left);

    // Right side
    const right = new THREE.Mesh(new THREE.BoxGeometry(wallT, H, D), cabinetMat);
    right.position.set(frameW/2 - wallT/2, H/2, 0);
    cabinetGroup.add(right);

    // 4 shelves inside
    for (let s = 1; s <= 4; s++) {
      const shelf = new THREE.Mesh(new THREE.BoxGeometry(frameW - 2*wallT, wallT, D - wallT), shelfMat);
      shelf.position.set(0, s * (H / 5), wallT/2);
      cabinetGroup.add(shelf);
    }

    // Door (front panel, slightly protruding)
    const doorH = H - 0.004;
    const door = new THREE.Mesh(new THREE.BoxGeometry(frameW - 0.004, doorH, 0.02), doorMat);
    door.position.set(0, H/2, D/2 - 0.008);
    cabinetGroup.add(door);
    addEdges(door, cabinetGroup);

    // Handle (vertical bar)
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.14, 0.025), handleMat);
    handle.position.set(frameW/2 - 0.06, H * 0.55, D/2 + 0.005);
    cabinetGroup.add(handle);

    cabinetGroup.position.x = offsetX;
    group.add(cabinetGroup);
  }

  // Top panel (glass topplate 180×40cm, ~8mm thick)
  const topPanelT = 0.008;
  const topPanelMat = new THREE.MeshLambertMaterial({
    color: 0x445566, transparent: true, opacity: 0.5
  });
  const topPanel = new THREE.Mesh(new THREE.BoxGeometry(W + 0.01, topPanelT, D + 0.005), topPanelMat);
  topPanel.position.set(0, H + topPanelT/2, 0);
  group.add(topPanel);
  // Glass edge highlight
  const topEdges = new THREE.LineSegments(
    new THREE.EdgesGeometry(topPanel.geometry),
    new THREE.LineBasicMaterial({ color: 0x667788, transparent: true, opacity: 0.6 })
  );
  topEdges.position.copy(topPanel.position);
  group.add(topEdges);

  // Dividing lines between cabinets (vertical gap lines)
  const lineMat = new THREE.LineBasicMaterial({ color: 0x111111 });
  for (let i = 1; i < 3; i++) {
    const x = -W/2 + i * frameW;
    const lineGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, 0, D/2), new THREE.Vector3(x, H, D/2)
    ]);
    group.add(new THREE.Line(lineGeo, lineMat));
  }

  // Outer wireframe for bounding box (for selection raycasting)
  const boundingBox = new THREE.Mesh(
    new THREE.BoxGeometry(W, H, D),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  boundingBox.position.y = H/2;
  group.add(boundingBox);
  // Move bounding box to first child for selection (children[0])
  group.children.splice(group.children.indexOf(boundingBox), 1);
  group.children.unshift(boundingBox);
}

// ─── Söderhamn hjørnesofa 3-seter (L-form ~192×192cm, h=83cm) ───
function createSoderhamn(group) {
  const seatH = 0.40, backH = 0.83, seatD = 0.99;
  const cushionT = 0.18; // seat cushion thickness
  const backCushionT = 0.20;
  const armW = 0.06;
  const sectionW = 0.93; // width of each sitting section
  const cornerW = 0.99;
  const totalArm1 = cornerW + sectionW; // 1.92m
  const totalArm2 = cornerW + sectionW; // 1.92m
  const legH = 0.14;

  const frameMat = new THREE.MeshLambertMaterial({ color: 0x6E6E6E });
  const cushionMat = new THREE.MeshLambertMaterial({ color: 0x8E8E8E });
  const backMat = new THREE.MeshLambertMaterial({ color: 0x7E7E7E });
  const legMat = new THREE.MeshLambertMaterial({ color: 0x333333 });

  // Bounding box for raycasting (children[0])
  const boundingBox = new THREE.Mesh(
    new THREE.BoxGeometry(totalArm1, backH, totalArm2),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  boundingBox.position.set(0, backH/2, 0);
  group.add(boundingBox);

  // Helper: create a sofa segment (seat base + cushion + back cushion)
  function sofaSegment(w, d, x, z, backSide) {
    // Seat base/frame
    const base = new THREE.Mesh(new THREE.BoxGeometry(w, seatH - cushionT - legH, d), frameMat);
    base.position.set(x, legH + (seatH - cushionT - legH)/2, z);
    group.add(base);

    // Seat cushion
    const cushion = new THREE.Mesh(new THREE.BoxGeometry(w - 0.04, cushionT, d - 0.04), cushionMat);
    cushion.position.set(x, seatH - cushionT/2, z);
    group.add(cushion);

    // Back cushion
    if (backSide === 'z-') {
      const bc = new THREE.Mesh(new THREE.BoxGeometry(w, backH - seatH, backCushionT), backMat);
      bc.position.set(x, seatH + (backH - seatH)/2, z - d/2 + backCushionT/2);
      group.add(bc);
    } else if (backSide === 'x-') {
      const bc = new THREE.Mesh(new THREE.BoxGeometry(backCushionT, backH - seatH, d), backMat);
      bc.position.set(x - w/2 + backCushionT/2, seatH + (backH - seatH)/2, z);
      group.add(bc);
    } else if (backSide === 'both') {
      const bc1 = new THREE.Mesh(new THREE.BoxGeometry(w, backH - seatH, backCushionT), backMat);
      bc1.position.set(x, seatH + (backH - seatH)/2, z - d/2 + backCushionT/2);
      group.add(bc1);
      const bc2 = new THREE.Mesh(new THREE.BoxGeometry(backCushionT, backH - seatH, d), backMat);
      bc2.position.set(x - w/2 + backCushionT/2, seatH + (backH - seatH)/2, z);
      group.add(bc2);
    }

    // Legs (4 small cylinders under base)
    const legR = 0.02;
    const positions = [
      [x - w/2 + 0.06, z - d/2 + 0.06],
      [x + w/2 - 0.06, z - d/2 + 0.06],
      [x - w/2 + 0.06, z + d/2 - 0.06],
      [x + w/2 - 0.06, z + d/2 - 0.06],
    ];
    for (const [lx, lz] of positions) {
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(legR, legR, legH, 6), legMat);
      leg.position.set(lx, legH/2, lz);
      group.add(leg);
    }
  }

  // L-shape layout (origin at center of bounding box)
  // Corner piece at the inner corner (-x, -z)
  const cx = -totalArm1/2 + cornerW/2;
  const cz = -totalArm2/2 + cornerW/2;
  sofaSegment(cornerW, cornerW, cx, cz, 'both');

  // Arm 1: extends along +X from corner (back along -Z)
  const arm1x = -totalArm1/2 + cornerW + sectionW/2;
  const arm1z = -totalArm2/2 + seatD/2;
  sofaSegment(sectionW, seatD, arm1x, arm1z, 'z-');

  // Arm 2: extends along +Z from corner (back along -X)
  const arm2x = -totalArm1/2 + seatD/2;
  const arm2z = -totalArm2/2 + cornerW + sectionW/2;
  sofaSegment(seatD, sectionW, arm2x, arm2z, 'x-');
}

// ─── Bolia Cana HiFi-møbel (128×46×40cm) + Samsung The Frame 50" ───
function createCanaTv(group) {
  // Cana bench dimensions
  const benchW = 1.28, benchH = 0.46, benchD = 0.40;
  const legH = 0.12, legR = 0.015;
  const bodyH = benchH - legH;

  const oakMat = new THREE.MeshLambertMaterial({ color: 0xC4A87C }); // light oak
  const frontMat = new THREE.MeshLambertMaterial({ color: 0xB89B6A }); // woven front
  const legMat = new THREE.MeshLambertMaterial({ color: 0x8B7355 });
  const tvMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const screenMat = new THREE.MeshLambertMaterial({ color: 0x222233 });

  // Bounding box for raycasting (children[0])
  const totalH = benchH + 0.645; // bench + TV
  const boundingBox = new THREE.Mesh(
    new THREE.BoxGeometry(benchW, totalH, benchD),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  boundingBox.position.y = totalH/2;
  group.add(boundingBox);

  // Bench body (top plate + sides)
  const topPlate = new THREE.Mesh(new THREE.BoxGeometry(benchW, 0.025, benchD), oakMat);
  topPlate.position.set(0, benchH - 0.0125, 0);
  group.add(topPlate);

  // Left side panel
  const sideH = bodyH - 0.025;
  const leftSide = new THREE.Mesh(new THREE.BoxGeometry(0.02, sideH, benchD), oakMat);
  leftSide.position.set(-benchW/2 + 0.01, legH + sideH/2, 0);
  group.add(leftSide);

  // Right side panel
  const rightSide = new THREE.Mesh(new THREE.BoxGeometry(0.02, sideH, benchD), oakMat);
  rightSide.position.set(benchW/2 - 0.01, legH + sideH/2, 0);
  group.add(rightSide);

  // Center divider
  const divider = new THREE.Mesh(new THREE.BoxGeometry(0.02, sideH, benchD - 0.04), oakMat);
  divider.position.set(0, legH + sideH/2, 0);
  group.add(divider);

  // Front panels (woven texture effect - two doors)
  const doorW = (benchW - 0.06) / 2;
  for (let i = 0; i < 2; i++) {
    const dx = -benchW/2 + 0.03 + doorW/2 + i * (doorW + 0.02);
    const frontPanel = new THREE.Mesh(new THREE.BoxGeometry(doorW, sideH - 0.02, 0.015), frontMat);
    frontPanel.position.set(dx, legH + sideH/2, benchD/2 - 0.007);
    group.add(frontPanel);
    addEdges(frontPanel, group);

    // Horizontal lines to simulate woven pattern
    const lineMatW = new THREE.LineBasicMaterial({ color: 0x9B8060, transparent: true, opacity: 0.5 });
    for (let j = 1; j <= 6; j++) {
      const ly = legH + j * (sideH / 7);
      const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(dx - doorW/2 + 0.01, ly, benchD/2 + 0.001),
        new THREE.Vector3(dx + doorW/2 - 0.01, ly, benchD/2 + 0.001),
      ]);
      group.add(new THREE.Line(lineGeo, lineMatW));
    }
  }

  // Back panel
  const backPanel = new THREE.Mesh(new THREE.BoxGeometry(benchW - 0.04, sideH, 0.012), oakMat);
  backPanel.position.set(0, legH + sideH/2, -benchD/2 + 0.006);
  group.add(backPanel);

  // Bottom shelf
  const bottomShelf = new THREE.Mesh(new THREE.BoxGeometry(benchW - 0.04, 0.015, benchD - 0.04), oakMat);
  bottomShelf.position.set(0, legH + 0.0075, 0);
  group.add(bottomShelf);

  // 4 legs (tapered wooden legs)
  const legPositions = [
    [-benchW/2 + 0.04, -benchD/2 + 0.04],
    [benchW/2 - 0.04, -benchD/2 + 0.04],
    [-benchW/2 + 0.04, benchD/2 - 0.04],
    [benchW/2 - 0.04, benchD/2 - 0.04],
  ];
  for (const [lx, lz] of legPositions) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(legR, legR * 1.3, legH, 6), legMat);
    leg.position.set(lx, legH/2, lz);
    group.add(leg);
  }

  // ─── Samsung The Frame 50" TV ───
  // 112.52 × 64.52 × 2.54 cm
  const tvW = 1.1252, tvH = 0.6452, tvD = 0.0254;
  const frameT = 0.025; // frame border thickness

  // TV frame (outer)
  const tvFrame = new THREE.Mesh(new THREE.BoxGeometry(tvW, tvH, tvD), tvMat);
  tvFrame.position.set(0, benchH + tvH/2 + 0.005, 0);
  group.add(tvFrame);
  addEdges(tvFrame, group);

  // Screen (slightly recessed)
  const screenW = tvW - 2 * frameT;
  const screenH2 = tvH - 2 * frameT;
  const screen = new THREE.Mesh(new THREE.BoxGeometry(screenW, screenH2, 0.003), screenMat);
  screen.position.set(0, benchH + tvH/2 + 0.005, tvD/2 + 0.001);
  group.add(screen);

  // "The Frame" label effect - subtle art frame look
  const frameBorderMat = new THREE.LineBasicMaterial({ color: 0x444444 });
  const by = benchH + 0.005;
  const frameLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-screenW/2, by + frameT, tvD/2 + 0.002),
    new THREE.Vector3(screenW/2, by + frameT, tvD/2 + 0.002),
    new THREE.Vector3(screenW/2, by + tvH - frameT, tvD/2 + 0.002),
    new THREE.Vector3(-screenW/2, by + tvH - frameT, tvD/2 + 0.002),
    new THREE.Vector3(-screenW/2, by + frameT, tvD/2 + 0.002),
  ]);
  group.add(new THREE.Line(frameLineGeo, frameBorderMat));
}

function createFurnitureMesh(type) {
  const cat = FURNITURE_CATALOG[type];
  const group = new THREE.Group();

  if (cat.custom === 'besta') {
    createBesta(group);
  } else if (cat.custom === 'soderhamn') {
    createSoderhamn(group);
  } else if (cat.custom === 'cana_tv') {
    createCanaTv(group);
  } else {
    // Default simple box
    const geo = new THREE.BoxGeometry(cat.w, cat.h, cat.d);
    const mat = new THREE.MeshLambertMaterial({ color: cat.color });
    const box = new THREE.Mesh(geo, mat);
    box.position.y = cat.h / 2;
    group.add(box);

    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
    );
    edges.position.y = cat.h / 2;
    group.add(edges);
  }

  // Label
  addLabel(cat.name, cat.h, group);

  group.userData.type = type;
  return group;
}

window.addFurniture = function(type) {
  if (!type) type = document.getElementById('furnSelect').value;
  const cat = FURNITURE_CATALOG[type];
  if (!cat) return;

  const id = nextItemId++;
  const mesh = createFurnitureMesh(type);

  // Place near center of room, offset by item count to avoid stacking
  const offsetX = (placedItems.length % 3) * 1.5;
  const offsetZ = Math.floor(placedItems.length / 3) * 1.2;
  const x = -1 + offsetX;
  const z = -0.5 + offsetZ;
  mesh.position.set(x, 0, z);

  scene.add(mesh);
  const item = { id, type, x, z, rotation: 0, mesh };
  placedItems.push(item);
  selectFurniture(id);
  renderFurnitureList();
};

function selectFurniture(id) {
  // Deselect previous
  if (selectedItemId !== null) {
    const prev = placedItems.find(i => i.id === selectedItemId);
    if (prev) {
      const cat = FURNITURE_CATALOG[prev.type];
      prev.mesh.children[0].material.color.setHex(cat.color);
    }
  }
  selectedItemId = id;
  // Highlight selected
  if (id !== null) {
    const item = placedItems.find(i => i.id === id);
    if (item) {
      item.mesh.children[0].material.color.setHex(0x66AADD);
    }
  }
  renderFurnitureList();
}

window.removeFurniture = function(id) {
  const idx = placedItems.findIndex(i => i.id === id);
  if (idx === -1) return;
  scene.remove(placedItems[idx].mesh);
  placedItems.splice(idx, 1);
  if (selectedItemId === id) selectedItemId = null;
  renderFurnitureList();
};

window.updateFurnPos = function(id) {
  const item = placedItems.find(i => i.id === id);
  if (!item) return;
  const xEl = document.getElementById('fx_' + id);
  const zEl = document.getElementById('fz_' + id);
  const rEl = document.getElementById('fr_' + id);
  if (xEl) { item.x = parseFloat(xEl.value); document.getElementById('fxv_' + id).textContent = item.x.toFixed(1); }
  if (zEl) { item.z = parseFloat(zEl.value); document.getElementById('fzv_' + id).textContent = item.z.toFixed(1); }
  if (rEl) { item.rotation = parseFloat(rEl.value); document.getElementById('frv_' + id).textContent = item.rotation + '°'; }
  item.mesh.position.set(item.x, 0, item.z);
  item.mesh.rotation.y = item.rotation * Math.PI / 180;
};

function renderFurnitureList() {
  const list = document.getElementById('furnList');
  list.innerHTML = '';
  for (const item of placedItems) {
    const cat = FURNITURE_CATALOG[item.type];
    const sel = item.id === selectedItemId;
    const div = document.createElement('div');
    div.className = 'furn-item' + (sel ? ' selected' : '');
    div.innerHTML = `
      <div class="furn-item-header">
        <span onclick="selectFurniture(${item.id})">${cat.name}</span>
        <button class="btn-del" onclick="removeFurniture(${item.id})" title="Slett">&times;</button>
      </div>
      <div class="furn-controls">
        <label>X: <span id="fxv_${item.id}">${item.x.toFixed(1)}</span>m</label>
        <label>Z: <span id="fzv_${item.id}">${item.z.toFixed(1)}</span>m</label>
        <input type="range" id="fx_${item.id}" min="-4.5" max="4.5" step="0.05" value="${item.x}" oninput="updateFurnPos(${item.id})">
        <input type="range" id="fz_${item.id}" min="-2.6" max="2.6" step="0.05" value="${item.z}" oninput="updateFurnPos(${item.id})">
        <label>Rot: <span id="frv_${item.id}">${item.rotation}°</span></label>
        <div></div>
        <input type="range" id="fr_${item.id}" min="0" max="360" step="5" value="${item.rotation}" oninput="updateFurnPos(${item.id})" style="grid-column:1/3">
      </div>
    `;
    list.appendChild(div);
  }
}
window.selectFurniture = selectFurniture;

// ─── CLICK TO SELECT FURNITURE (Raycaster) ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.offsetX / renderer.domElement.clientWidth) * 2 - 1;
  mouse.y = -(e.offsetY / renderer.domElement.clientHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check furniture meshes
  const furnMeshes = placedItems.map(i => i.mesh.children[0]); // the box mesh
  const hits = raycaster.intersectObjects(furnMeshes);
  if (hits.length > 0) {
    const hitMesh = hits[0].object;
    const item = placedItems.find(i => i.mesh.children[0] === hitMesh);
    if (item) {
      selectFurniture(item.id);
      return;
    }
  }
  // Click on empty space deselects
  selectFurniture(null);
});

// ─── CONTROL WIRING ───
document.getElementById('hSlider').addEventListener('input', updateSimulator);
document.getElementById('clubSelect').addEventListener('change', updateSimulator);
document.querySelectorAll('input[name="dir"]').forEach(r => r.addEventListener('change', updateSimulator));
document.getElementById('simXSlider').addEventListener('input', updateSimulator);
document.getElementById('simZSlider').addEventListener('input', updateSimulator);

// ─── SECTION TOGGLE ───
window.toggleSection = function(header) {
  header.parentElement.classList.toggle('collapsed');
};

// ─── ANIMATION LOOP ───
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
});

// ─── VIEW CONTROLS ───
window.setTopDown = function() {
  camera.position.set(objCenter.x, 14, objCenter.z);
  controls.target.copy(objCenter);
  camera.up.set(0, 0, -1);
  controls.update();
};

window.set3DView = function() {
  camera.position.set(objCenter.x + 6, 5, objCenter.z + 8);
  controls.target.copy(objCenter);
  camera.up.set(0, 1, 0);
  controls.update();
};

window.setFrontView = function() {
  camera.position.set(objCenter.x, 1.5, objCenter.z - 10);
  controls.target.set(objCenter.x, 1.5, objCenter.z);
  camera.up.set(0, 1, 0);
  controls.update();
};

window.setSideView = function() {
  camera.position.set(10, 2.0, 0);
  controls.target.set(0, 1.0, 0);
  camera.up.set(0, 1, 0);
  controls.update();
};
