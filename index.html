<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>Eidos — 3D Romplanlegger</title>
<style>
/* ─── Reset & Base ─── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden;background:#1a1a1a}

/* ─── Canvas (full viewport) ─── */
#canvas-wrap{position:absolute;top:0;left:0;width:100vw;height:100vh}
canvas{display:block;width:100%;height:100%}

/* ─── Glass Panel ─── */
.glass-panel{
  position:fixed;top:12px;right:12px;bottom:12px;width:320px;
  background:rgba(18,18,24,0.78);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  z-index:100;
  display:flex;flex-direction:column;overflow:hidden;
  color:#d8d8d8;font-size:13px;
  transition:transform 0.3s cubic-bezier(.4,0,.2,1),opacity 0.25s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.glass-panel.collapsed{transform:translateX(340px);opacity:0;pointer-events:none}

/* ─── Panel Header / Tabs ─── */
#panel-header{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
#panel-tabs{display:flex;flex:1}
#panel-tabs .tab{
  flex:1;padding:11px 0;background:none;border:none;
  color:rgba(255,255,255,0.4);font-size:11.5px;font-weight:600;letter-spacing:0.03em;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:color 0.2s,border-color 0.2s;text-transform:uppercase;
}
#panel-tabs .tab:hover{color:rgba(255,255,255,0.7)}
#panel-tabs .tab.active{color:#fff;border-bottom-color:#4a9eff}
#panel-collapse{
  background:none;border:none;color:rgba(255,255,255,0.3);
  font-size:20px;cursor:pointer;padding:0 14px;line-height:1;
  transition:color 0.2s;
}
#panel-collapse:hover{color:rgba(255,255,255,0.7)}

/* ─── Tab Content ─── */
.tab-content{flex:1;overflow-y:auto;padding:16px}
.tab-content::-webkit-scrollbar{width:4px}
.tab-content::-webkit-scrollbar-track{background:transparent}
.tab-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}

/* ─── Panel Sections ─── */
.panel-section{margin-bottom:20px}
.panel-section h3{
  font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);margin-bottom:10px;
}

/* ─── Dark theme overrides (inside panel) ─── */
.glass-panel label{display:block;font-size:12px;color:rgba(255,255,255,0.55);margin-bottom:3px}
.glass-panel label b{color:rgba(255,255,255,0.85)}
.glass-panel select{
  width:100%;padding:7px 10px;margin-bottom:8px;font-size:13px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:#d8d8d8;border-radius:8px;outline:none;
  transition:border-color 0.2s;
}
.glass-panel select:focus{border-color:rgba(74,158,255,0.4)}
.glass-panel select option{background:#1e1e2e;color:#d8d8d8}
.glass-panel input[type=range]{width:100%;margin:2px 0 8px;accent-color:#4a9eff}
.glass-panel input[type=checkbox]{accent-color:#4a9eff}
.glass-panel h2{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:6px}

/* ─── View Buttons (2×2 grid) ─── */
.view-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
button.view-btn{
  padding:9px 0;font-size:12px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);border-radius:8px;
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7);
  transition:all 0.15s;
}
button.view-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.15)}

/* ─── Info Grid ─── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;font-size:12px}
.info-grid .lbl{color:rgba(255,255,255,0.4)}
.info-grid .val{color:#d8d8d8;font-weight:600}
.val.ok{color:#4ade80}
.val.tight{color:#fbbf24}
.val.bad{color:#f87171}

/* ─── Radio Group ─── */
.radio-group{display:flex;gap:10px;margin-bottom:8px}
.radio-group label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.6)}
.radio-group input[type=radio]{accent-color:#4a9eff}

/* ─── Furniture Controls ─── */
.furn-item{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px;
  transition:border-color 0.15s,background 0.15s;
}
.furn-item.selected{border-color:rgba(74,158,255,0.5);background:rgba(74,158,255,0.08)}
.furn-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.furn-item-header span{font-weight:600;cursor:pointer;color:rgba(255,255,255,0.8)}
.furn-item-header span:hover{color:#4a9eff}
.btn-del{background:none;border:none;color:rgba(255,100,100,0.6);cursor:pointer;font-size:16px;line-height:1;padding:0 4px;transition:color 0.15s}
.btn-del:hover{color:#f87171}
.furn-controls{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
.furn-controls label{font-size:11px;margin-bottom:0;color:rgba(255,255,255,0.45)}
.furn-controls input[type=range]{margin:0 0 4px}
.rot-btns{display:flex;gap:4px;margin:3px 0 6px}
.rot-btns button{
  flex:1;padding:4px 0;font-size:11px;cursor:pointer;
  border:1px solid rgba(255,255,255,0.1);border-radius:5px;
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);
  transition:all 0.15s;
}
.rot-btns button:hover{background:rgba(255,255,255,0.1);color:#fff}
.rot-btns button.active{background:rgba(74,158,255,0.25);color:#4a9eff;border-color:rgba(74,158,255,0.4)}

button.add-btn{
  width:100%;padding:9px;font-size:12px;cursor:pointer;font-weight:600;
  border:1px solid rgba(74,158,255,0.2);border-radius:8px;
  background:rgba(74,158,255,0.08);color:#4a9eff;
  transition:all 0.15s;margin-top:4px;
}
button.add-btn:hover{background:rgba(74,158,255,0.15);border-color:rgba(74,158,255,0.35)}

/* ─── Calibration Room Cards ─── */
.room-card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:10px 12px;margin-bottom:6px;
  transition:border-color 0.2s,background 0.2s;cursor:pointer;
}
.room-card:hover{border-color:rgba(255,255,255,0.15)}
.room-card.active{border-color:rgba(74,158,255,0.5);background:rgba(74,158,255,0.06)}
.room-card .room-name{font-size:12px;font-weight:600;color:rgba(255,255,255,0.8);margin-bottom:6px}
.room-card .room-floor{font-size:10px;color:rgba(255,255,255,0.3);font-weight:400;margin-left:6px}
.room-dims{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.room-dims label{font-size:11px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:4px}
.room-dims input[type=number]{
  width:70px;padding:4px 6px;font-size:12px;font-family:monospace;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:#d8d8d8;border-radius:5px;outline:none;text-align:right;
  transition:border-color 0.2s;
}
.room-dims input[type=number]:focus{border-color:rgba(74,158,255,0.5)}
.room-dims input[type=number]::-webkit-inner-spin-button{opacity:0.3}
.room-dims .unit{font-size:11px;color:rgba(255,255,255,0.3)}
.cal-total{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 10px;margin-top:2px;font-size:11px;
  color:rgba(255,255,255,0.35);border-top:1px solid rgba(255,255,255,0.05);
}
.cal-total .sum{font-family:monospace;color:rgba(255,255,255,0.5)}
.cal-total .sum.mismatch{color:#fbbf24}
.cal-floor-header{
  font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  color:rgba(255,255,255,0.25);margin:12px 0 6px;padding-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.cal-floor-header:first-child{margin-top:0}

/* ─── Keyboard Hints ─── */
.shortcuts{margin-top:4px}
.shortcut-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:rgba(255,255,255,0.4)}
.shortcut-key{
  display:inline-block;padding:2px 7px;font-size:11px;font-weight:600;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:4px;color:rgba(255,255,255,0.6);font-family:monospace;
}

/* ─── Panel Toggle Button ─── */
#panel-toggle{
  position:fixed;top:16px;right:16px;width:42px;height:42px;
  background:rgba(18,18,24,0.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;
  color:rgba(255,255,255,0.6);font-size:18px;cursor:pointer;z-index:99;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
#panel-toggle:hover{background:rgba(30,30,40,0.85);color:#fff}

/* ─── Status (bottom-left) ─── */
#status{
  position:fixed;bottom:16px;left:146px;
  font-size:11px;color:rgba(255,255,255,0.35);z-index:10;pointer-events:none;
}

/* ─── Compass (bottom-left, hover-reveal) ─── */
#compass-wrap{
  position:absolute;bottom:12px;left:12px;width:48px;height:48px;z-index:10;
  cursor:default;transition:width 0.25s ease,height 0.25s ease;
}
#compass-wrap:hover{width:100px;height:100px}
#compass-wrap svg{width:100%;height:100%;opacity:0.35;transition:opacity 0.25s ease}
#compass-wrap:hover svg{opacity:0.9}
#compass-ring{transition:transform 0.15s ease}
</style>
</head>
<body>

<!-- ─── 3D Viewport (full screen) ─── -->
<div id="canvas-wrap">
  <div id="compass-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <g id="compass-ring">
        <!-- N/S/Ø/V labels + north arrow — this group rotates with camera -->
        <polygon points="50,10 46,22 54,22" fill="#e74c3c"/>
        <polygon points="50,90 46,78 54,78" fill="rgba(255,255,255,0.25)"/>
        <text x="50" y="9" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c" font-family="system-ui">N</text>
        <text x="50" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.5)" font-family="system-ui">S</text>
        <text x="95" y="54" text-anchor="middle" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.5)" font-family="system-ui">Ø</text>
        <text x="6" y="54" text-anchor="middle" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.5)" font-family="system-ui">V</text>
      </g>
      <circle cx="50" cy="50" r="2.5" fill="rgba(255,255,255,0.3)"/>
    </svg>
  </div>
</div>

<!-- ─── Glass Panel ─── -->
<div id="panel" class="glass-panel">
  <div id="panel-header">
    <div id="panel-tabs">
      <button class="tab active" data-tab="oversikt">Oversikt</button>
      <button class="tab" data-tab="mobler">Møbler</button>
      <button class="tab" data-tab="golfsim">Golfsim</button>
    </div>
    <button id="panel-collapse" title="Skjul panel">&times;</button>
  </div>

  <!-- Tab: Oversikt -->
  <div id="tab-oversikt" class="tab-content">
    <div class="panel-section">
      <h3>Kameravisning</h3>
      <div class="view-btn-grid">
        <button class="view-btn" onclick="setTopDown()">Ovenfra</button>
        <button class="view-btn" onclick="set3DView()">3D</button>
        <button class="view-btn" onclick="setFrontView()">Front</button>
        <button class="view-btn" onclick="setSideView()">Side</button>
      </div>
    </div>
    <div class="panel-section">
      <h3>Bolig</h3>
      <div id="apartment-info" class="info-grid">
        <span class="lbl">Laster...</span>
      </div>
    </div>
    <div class="panel-section">
      <h3>Rommål (kalibrering)</h3>
      <div id="room-calibration"></div>
    </div>
    <div class="panel-section">
      <h3>Hurtigtaster</h3>
      <div class="shortcuts">
        <div class="shortcut-row"><span class="shortcut-key">R</span> Roter møbel 90°</div>
        <div class="shortcut-row"><span class="shortcut-key">Del</span> Slett valgt møbel</div>
        <div class="shortcut-row"><span class="shortcut-key">Dra</span> Flytt møbel på gulvet</div>
      </div>
    </div>
  </div>

  <!-- Tab: Møbler -->
  <div id="tab-mobler" class="tab-content" style="display:none">
    <div class="panel-section">
      <h3>Legg til møbel</h3>
      <select id="furnSelect">
        <option value="besta_3x">BESTÅ skap (3×60cm)</option>
        <option value="soderhamn">Söderhamn hjørnesofa 3-s</option>
        <option value="cana_tv">Bolia Cana + Frame 50" TV</option>
        <option value="sofa_3">Sofa (3-seter)</option>
        <option value="sofa_2">Sofa (2-seter)</option>
        <option value="stol">Lenestol</option>
        <option value="sofabord">Sofabord</option>
        <option value="spisebord">Spisebord</option>
        <option value="tv_benk">TV-benk</option>
        <option value="bokhylle">Bokhylle</option>
        <option value="gulvlampe">Gulvlampe</option>
        <option value="kjokkenbenk">Kjøkkenbenk</option>
        <option value="spisestol">Spisestol</option>
      </select>
      <button class="add-btn" onclick="addFurniture()">+ Legg til</button>
    </div>
    <div class="panel-section">
      <h3>Plasserte møbler</h3>
      <div id="furnList"></div>
    </div>
  </div>

  <!-- Tab: Golfsim -->
  <div id="tab-golfsim" class="tab-content" style="display:none">
    <div class="panel-section">
      <label style="margin-bottom:10px"><input type="checkbox" id="simToggle" checked> <b>Vis simulator</b></label>
      <div id="simControls">
        <label><b>Spillerhøyde:</b> <span id="hVal">180</span> cm</label>
        <input type="range" id="hSlider" min="160" max="205" value="180" step="1">

        <label><b>Klubb:</b></label>
        <select id="clubSelect">
          <option value="1.143">Driver (45")</option>
          <option value="1.016">3-wood (40")</option>
          <option value="0.978">Hybrid (38.5")</option>
          <option value="0.940" selected>7-jern (37")</option>
          <option value="0.914">9-jern (36")</option>
          <option value="0.889">Wedge (35")</option>
        </select>

        <label><b>Retning:</b></label>
        <div class="radio-group">
          <label><input type="radio" name="dir" value="window" checked> Mot vindu</label>
          <label><input type="radio" name="dir" value="along"> Langs rommet</label>
        </div>

        <label><b>Posisjon X:</b> <span id="simXVal">2.5</span>m</label>
        <input type="range" id="simXSlider" min="-4" max="4" value="2.5" step="0.05">

        <label><b>Posisjon Z:</b> <span id="simZVal">0.5</span>m</label>
        <input type="range" id="simZSlider" min="-2.5" max="2.5" value="0.5" step="0.05">
      </div>
    </div>
    <div class="panel-section">
      <h3>Klaringer</h3>
      <div class="info-grid">
        <span class="lbl">Tak-klaring:</span><span class="val" id="cCeil">–</span>
        <span class="lbl">Hemskant:</span><span class="val" id="cHems">–</span>
        <span class="lbl">Side V:</span><span class="val" id="cSideL">–</span>
        <span class="lbl">Side H:</span><span class="val" id="cSideR">–</span>
        <span class="lbl">Skjerm:</span><span class="val" id="cScreen">–</span>
        <span class="lbl">Svingradius:</span><span class="val" id="cSwing">–</span>
      </div>
    </div>
  </div>
</div>

<!-- ─── Panel Toggle (visible when collapsed) ─── -->
<button id="panel-toggle" style="display:none" title="Vis panel">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="2" y="8" width="14" height="2" rx="1" fill="currentColor"/><rect x="2" y="13" width="14" height="2" rx="1" fill="currentColor"/></svg>
</button>

<!-- ─── Status ─── -->
<div id="status">Laster...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module" src="js/main.js?v=4"></script>
</body>
</html>
